AWSTemplateFormatVersion: '2010-09-09'
Description: Secure 1Password Item Creator with Client-Side Encryption

# ============================================================================
# PARAMETERS
# ============================================================================

Parameters:
  # === 1Password Configuration ===
  OPServiceAccountToken:
    Type: String
    NoEcho: true
    Description: "REQUIRED: 1Password service account token (secure)"
  
  TargetVaultID:
    Type: String
    Description: "REQUIRED: UUID of the 1Password vault where items will be created"
    AllowedPattern: "^[a-z0-9]{26}$"
    ConstraintDescription: "Must be a valid 26-character 1Password vault UUID"
  
  # === Security Configuration ===
  AllowedIPRanges:
    Type: CommaDelimitedList
    Default: '0.0.0.0/0'
    Description: "Comma-separated CIDR ranges (e.g., 1.2.3.4/32,5.6.7.0/24). Use 0.0.0.0/0 to allow all (not recommended for production)"
  
  # === Domain Configuration (Optional) ===
  CustomDomainName:
    Type: String
    Default: ""
    Description: "OPTIONAL: Custom domain name for CloudFront (e.g., items.example.com)"
  
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: "OPTIONAL: ACM certificate ARN in us-east-1 for custom domain"
  
  CreateRoute53Record:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Create Route53 DNS record for custom domain?"
  
  Route53HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 Hosted Zone ID (required if CreateRoute53Record is true)"
  
  # === Lambda Configuration ===
  LambdaMemory:
    Type: Number
    Default: 1024
    MinValue: 512
    MaxValue: 10240
    Description: "Memory for Lambda function (MB)"
  
  LambdaTimeout:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 900
    Description: "Timeout for Lambda function (seconds)"
  
  # === API Configuration ===
  StageName:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: "API Gateway stage name"

# ============================================================================
# CONDITIONS
# ============================================================================

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, ""]]
  HasCertificate: !Not [!Equals [!Ref AcmCertificateArn, ""]]
  UseCustomDomain: !And
    - !Condition HasCustomDomain
    - !Condition HasCertificate
  CreateRoute53RecordCondition: !And
    - !Equals [!Ref CreateRoute53Record, "true"]
    - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
    - !Condition UseCustomDomain
  EnableWAF: !Not [!Equals [!Join ['', !Ref AllowedIPRanges], '0.0.0.0/0']]

# ============================================================================
# RESOURCES
# ============================================================================

Resources:
  # ==========================================================================
  # SECRETS & ENCRYPTION
  # ==========================================================================
  
  OPSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-OPToken"
      Description: "1Password service account token (encrypted at rest)"
      SecretString: !Ref OPServiceAccountToken
      KmsKeyId: !Ref EncryptionKey
      Tags:
        - Key: Application
          Value: SecureItemCreator
        - Key: ManagedBy
          Value: CloudFormation

  RSAPrivateKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-RSAPrivateKey"
      Description: "RSA private key for decrypting client-side encrypted data"
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: "placeholder"
        PasswordLength: 32
      KmsKeyId: !Ref EncryptionKey
      Tags:
        - Key: Application
          Value: SecureItemCreator
        - Key: ManagedBy
          Value: CloudFormation

  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key for encrypting 1Password secrets"
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowKeyAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:Create*'
              - 'kms:Describe*'
              - 'kms:Enable*'
              - 'kms:List*'
              - 'kms:Put*'
              - 'kms:Update*'
              - 'kms:Revoke*'
              - 'kms:Disable*'
              - 'kms:Get*'
              - 'kms:Delete*'
              - 'kms:TagResource'
              - 'kms:UntagResource'
              - 'kms:ScheduleKeyDeletion'
              - 'kms:CancelKeyDeletion'
            Resource: '*'
          - Sid: AllowKeyUsageViaSecretsManager
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
              - 'kms:Encrypt'
              - 'kms:GenerateDataKey'
              - 'kms:ReEncrypt*'
            Resource: '*'
            Condition:
              StringEquals:
                'kms:ViaService':
                  - !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
          - Sid: AllowSecretsManagerService
            Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
              - 'kms:CreateGrant'
            Resource: '*'
      Tags:
        - Key: Application
          Value: SecureItemCreator

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-encryption'
      TargetKeyId: !Ref EncryptionKey

  # ==========================================================================
  # S3 BUCKET FOR STATIC WEBSITE
  # ==========================================================================
  
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-site-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !If
                - UseCustomDomain
                - !Sub "https://${CustomDomainName}"
                - "*"
            AllowedMethods: [GET, HEAD]
            AllowedHeaders: ['*']
            MaxAge: 3600
      Tags:
        - Key: Application
          Value: SecureItemCreator

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-OAC"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ==========================================================================
  # CLOUDFRONT SECURITY HEADERS
  # ==========================================================================

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-SecurityHeaders"
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: !Sub
              - "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ${ApiOrigin}; img-src 'self' data:; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
              - ApiOrigin: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com"
            Override: true

  # ==========================================================================
  # CLOUDFRONT DISTRIBUTION
  # ==========================================================================
  
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} Secure Item Creator"
        HttpVersion: http2and3
        Aliases: !If
          - UseCustomDomain
          - [!Ref CustomDomainName]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - UseCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${RestApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: !Sub "/${StageName}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            Compress: true
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
      Tags:
        - Key: Application
          Value: SecureItemCreator

  Route53Record:
    Type: AWS::Route53::RecordSet
    Condition: CreateRoute53RecordCondition
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # ==========================================================================
  # WAF (WEB APPLICATION FIREWALL)
  # ==========================================================================
  
  AllowedIPSet:
    Type: AWS::WAFv2::IPSet
    Condition: EnableWAF
    Properties:
      Name: !Sub "${AWS::StackName}-AllowedIPs"
      Scope: CLOUDFRONT
      IPAddressVersion: IPV4
      Addresses: !Ref AllowedIPRanges
      Tags:
        - Key: Application
          Value: SecureItemCreator

  WAFWebACL:
    Type: AWS::WAFv2::WebACL
    Condition: EnableWAF
    Properties:
      Name: !Sub "${AWS::StackName}-WAF"
      Scope: CLOUDFRONT
      DefaultAction:
        Block: {}
      Rules:
        - Name: AllowWhitelistedIPs
          Priority: 1
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt AllowedIPSet.Arn
          Action:
            Allow: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AllowedIPsRule
        - Name: RateLimitPerIP
          Priority: 2
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitRule
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-WAF"
      Tags:
        - Key: Application
          Value: SecureItemCreator

  # ==========================================================================
  # IAM ROLES
  # ==========================================================================
  
  ItemCreatorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ItemCreatorRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecureItemCreatorPolicies
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SecretsManagerDecrypt
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*"
              - Sid: KMSDecrypt
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*"
                Condition:
                  StringEquals:
                    'kms:ViaService': !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Application
          Value: SecureItemCreator

  KeyGeneratorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-KeyGeneratorRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: UpdateSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: UpdateRSAKey
                Effect: Allow
                Action:
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*"
              - Sid: KMSEncrypt
                Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*"
                Condition:
                  StringEquals:
                    'kms:ViaService': !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Application
          Value: SecureItemCreator

  # ==========================================================================
  # CLOUDWATCH LOG GROUPS
  # ==========================================================================
  
  ItemCreatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-ItemCreator"
      RetentionInDays: 7

  KeyGeneratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-KeyGenerator"
      RetentionInDays: 7

  GetPublicKeyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-GetPublicKey"
      RetentionInDays: 7

  # ==========================================================================
  # LAMBDA FUNCTIONS
  # ==========================================================================
  
  KeyGeneratorLambda:
    Type: AWS::Lambda::Function
    DependsOn: KeyGeneratorLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-KeyGenerator"
      Handler: index.lambda_handler
      Role: !GetAtt KeyGeneratorLambdaRole.Arn
      Runtime: python3.12
      MemorySize: 512
      Timeout: 180
      Environment:
        Variables:
          SECRET_ARN: !Ref RSAPrivateKeySecret
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import subprocess
          import sys
          import os
          import traceback
          
          secrets_client = boto3.client('secretsmanager')
          
          def lambda_handler(event, context):
              response_data = {}
              
              try:
                  print(f"Event received: {json.dumps(event, default=str)}")
                  print(f"Request Type: {event.get('RequestType')}")
                  
                  if event['RequestType'] == 'Delete':
                      print("Delete event - sending success immediately")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                      return
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      print("Starting RSA key generation process...")
                      
                      print("Step 1: Installing cryptography library...")
                      install_result = subprocess.run(
                          [sys.executable, '-m', 'pip', 'install', 
                           '--target', '/tmp/crypto-lib', 'cryptography'],
                          capture_output=True,
                          text=True,
                          timeout=120
                      )
                      
                      if install_result.returncode != 0:
                          raise Exception(f"Pip install failed: {install_result.stderr}")
                      
                      print("Step 2: Cryptography installed successfully")
                      
                      if '/tmp/crypto-lib' not in sys.path:
                          sys.path.insert(0, '/tmp/crypto-lib')
                      
                      print("Step 3: Importing cryptography modules...")
                      from cryptography.hazmat.primitives.asymmetric import rsa
                      from cryptography.hazmat.primitives import serialization
                      from cryptography.hazmat.backends import default_backend
                      
                      print("Step 4: Generating 2048-bit RSA keypair...")
                      private_key = rsa.generate_private_key(
                          public_exponent=65537,
                          key_size=2048,
                          backend=default_backend()
                      )
                      
                      print("Step 5: Serializing private key...")
                      private_pem = private_key.private_bytes(
                          encoding=serialization.Encoding.PEM,
                          format=serialization.PrivateFormat.PKCS8,
                          encryption_algorithm=serialization.NoEncryption()
                      ).decode('utf-8')
                      
                      print("Step 6: Serializing public key...")
                      public_key = private_key.public_key()
                      public_pem = public_key.public_bytes(
                          encoding=serialization.Encoding.PEM,
                          format=serialization.PublicFormat.SubjectPublicKeyInfo
                      ).decode('utf-8')
                      
                      print(f"Step 7: Storing keys in Secrets Manager...")
                      secret_value = json.dumps({
                          'private_key': private_pem,
                          'public_key': public_pem
                      })
                      
                      secret_arn = event['ResourceProperties']['SecretArn']
                      print(f"Secret ARN: {secret_arn}")
                      
                      secrets_client.put_secret_value(
                          SecretId=secret_arn,
                          SecretString=secret_value
                      )
                      
                      print("SUCCESS: RSA keypair generated and stored!")
                      response_data['Message'] = 'RSA keypair generated and stored successfully'
                      response_data['PublicKeyLength'] = len(public_pem)
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                      
              except Exception as e:
                  error_msg = f"ERROR: {str(e)}\n{traceback.format_exc()}"
                  print(error_msg)
                  response_data['Message'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Tags:
        - Key: Application
          Value: SecureItemCreator

  RSAKeyPairGenerator:
    Type: Custom::RSAKeyGenerator
    Properties:
      ServiceToken: !GetAtt KeyGeneratorLambda.Arn
      SecretArn: !Ref RSAPrivateKeySecret

  GetPublicKeyLambda:
    Type: AWS::Lambda::Function
    DependsOn: GetPublicKeyLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-GetPublicKey"
      Handler: index.lambda_handler
      Role: !GetAtt ItemCreatorLambdaRole.Arn
      Runtime: python3.12
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          SECRET_ARN: !Ref RSAPrivateKeySecret
          ALLOWED_ORIGIN: !If
            - UseCustomDomain
            - !Sub "https://${CustomDomainName}"
            - "*"
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          
          secrets_client = boto3.client('secretsmanager')
          
          # Cache the public key across warm invocations
          _cached_public_key = None
          
          def lambda_handler(event, context):
              global _cached_public_key
              
              allowed_origin = os.environ.get('ALLOWED_ORIGIN', '*')
              
              headers = {
                  'Content-Type': 'application/json',
                  'Access-Control-Allow-Origin': allowed_origin,
                  'Cache-Control': 'public, max-age=3600'
              }
              
              try:
                  if _cached_public_key is None:
                      response = secrets_client.get_secret_value(
                          SecretId=os.environ['SECRET_ARN']
                      )
                      keys = json.loads(response['SecretString'])
                      _cached_public_key = keys['public_key']
                  
                  return {
                      'statusCode': 200,
                      'headers': headers,
                      'body': json.dumps({
                          'publicKey': _cached_public_key
                      })
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': headers,
                      'body': json.dumps({'error': 'Failed to retrieve public key'})
                  }
      Tags:
        - Key: Application
          Value: SecureItemCreator

  # Main Lambda to create items in 1Password
  ItemCreatorLambda:
    Type: AWS::Lambda::Function
    DependsOn: ItemCreatorLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ItemCreator"
      Handler: index.lambda_handler
      Role: !GetAtt ItemCreatorLambdaRole.Arn
      Runtime: python3.12
      MemorySize: !Ref LambdaMemory
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          OP_SECRET_ARN: !Ref OPSecret
          RSA_SECRET_ARN: !Ref RSAPrivateKeySecret
          VAULT_ID: !Ref TargetVaultID
          LAMBDA_VERSION: "17.0"
          ALLOWED_ORIGIN: !If
            - UseCustomDomain
            - !Sub "https://${CustomDomainName}"
            - "*"
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          import sys
          import base64
          import traceback
          from datetime import datetime
          
          secrets_client = boto3.client('secretsmanager')
          
          SDK_INSTALLED = False
          OP_IMPORTED = False
          
          def get_allowed_origin():
              return os.environ.get('ALLOWED_ORIGIN', '*')
          
          def make_headers():
              return {
                  'Access-Control-Allow-Origin': get_allowed_origin(),
                  'Access-Control-Allow-Headers': 'Content-Type',
                  'Content-Type': 'application/json'
              }
          
          def import_onepassword():
              """Import 1Password SDK at module level after installation"""
              global OP_IMPORTED
              if not OP_IMPORTED:
                  import onepassword
                  globals().update({name: getattr(onepassword, name) for name in dir(onepassword) if not name.startswith('_')})
                  OP_IMPORTED = True
                  
                  # Introspect SDK types for debugging
                  try:
                      ft_members = {name: repr(getattr(ItemFieldType, name))
                                    for name in dir(ItemFieldType) if not name.startswith('_')}
                      log_secure('INFO', 'SDK ItemFieldType members', members=ft_members)
                      
                      cat_members = {name: repr(getattr(ItemCategory, name))
                                     for name in dir(ItemCategory) if not name.startswith('_')}
                      log_secure('INFO', 'SDK ItemCategory members', members=cat_members)
                      
                      import inspect
                      try:
                          sig = str(inspect.signature(ItemField.__init__))
                      except (ValueError, TypeError):
                          sig = str(ItemField.__init__.__doc__) if ItemField.__init__.__doc__ else 'unknown'
                      log_secure('INFO', 'ItemField signature', signature=sig)
                      
                      log_secure('INFO', 'DocumentCreateParams available', available=hasattr(onepassword, 'DocumentCreateParams'))
                  except Exception as e:
                      log_secure('WARN', f'SDK introspection failed: {e}')
          
          def log_secure(level, message, **kwargs):
              """Secure logging - never logs sensitive data"""
              safe_kwargs = {k: v for k, v in kwargs.items() 
                            if k not in ['password', 'encrypted_data', 'private_key', 'decrypted']}
              log_entry = {
                  'timestamp': datetime.utcnow().isoformat(),
                  'level': level,
                  'message': message,
                  **safe_kwargs
              }
              print(json.dumps(log_entry))
          
          def install_sdk():
              """Install 1Password SDK and cryptography library"""
              global SDK_INSTALLED
              if SDK_INSTALLED:
                  return
              sdk_dir = '/tmp/onepassword-sdk'
              if os.path.exists(sdk_dir) and sdk_dir in sys.path:
                  SDK_INSTALLED = True
                  import_onepassword()
                  return
              try:
                  import subprocess
                  subprocess.run(
                      [sys.executable, '-m', 'pip', 'install', 
                       '--target', sdk_dir, '--upgrade', 
                       'onepassword-sdk', 'cryptography'],
                      check=True, capture_output=True, timeout=120
                  )
                  if sdk_dir not in sys.path:
                      sys.path.insert(0, sdk_dir)
                  SDK_INSTALLED = True
                  import_onepassword()
                  log_secure('INFO', 'SDK and cryptography installed successfully')
              except Exception as e:
                  log_secure('ERROR', 'SDK installation failed', error=str(e))
                  raise
          
          def decrypt_rsa(encrypted_b64, private_key_pem):
              """Decrypt hybrid AES+RSA encrypted data"""
              from cryptography.hazmat.primitives import serialization
              from cryptography.hazmat.primitives.asymmetric import padding
              from cryptography.hazmat.primitives import hashes
              from cryptography.hazmat.backends import default_backend
              from cryptography.hazmat.primitives.ciphers.aead import AESGCM
              
              private_key = serialization.load_pem_private_key(
                  private_key_pem.encode('utf-8'),
                  password=None,
                  backend=default_backend()
              )
              
              encrypted_data = base64.b64decode(encrypted_b64)
              
              key_length = int.from_bytes(encrypted_data[0:4], 'big')
              encrypted_key = encrypted_data[4:4+key_length]
              iv = encrypted_data[4+key_length:4+key_length+12]
              encrypted_payload = encrypted_data[4+key_length+12:]
              
              aes_key = private_key.decrypt(
                  encrypted_key,
                  padding.OAEP(
                      mgf=padding.MGF1(algorithm=hashes.SHA256()),
                      algorithm=hashes.SHA256(),
                      label=None
                  )
              )
              
              aesgcm = AESGCM(aes_key)
              decrypted = aesgcm.decrypt(iv, encrypted_payload, None)
              
              return decrypted.decode('utf-8')
          
          # Build field-type mapping dynamically so we never guess enum casing
          _FIELD_TYPE_MAP = None
          
          def _build_field_type_map():
              """Build a case-insensitive lookup from ItemFieldType enum."""
              global _FIELD_TYPE_MAP
              if _FIELD_TYPE_MAP is not None:
                  return _FIELD_TYPE_MAP
              
              members = {name: val for name, val in vars(ItemFieldType).items()
                         if not name.startswith('_')}
              log_secure('INFO', 'Available ItemFieldType members',
                         members=list(members.keys()))
              
              ci = {}
              for name, val in members.items():
                  ci[name.lower()] = val
              
              _FIELD_TYPE_MAP = ci
              return _FIELD_TYPE_MAP
          
          def map_field_type(field_type_str):
              """Map frontend fieldType string to SDK ItemFieldType enum value."""
              ft_map = _build_field_type_map()
              result = ft_map.get(field_type_str.lower())
              if result is None:
                  log_secure('WARN', f'Unknown field type: {field_type_str}, defaulting to TEXT',
                             available=list(ft_map.keys()))
                  return ft_map.get('text', ItemFieldType.TEXT)
              return result
          
          def build_item_fields(raw_fields):
              """Convert raw field dicts from the frontend into proper ItemField objects."""
              item_fields = []
              for f in raw_fields:
                  kwargs = {
                      'id': f['id'],
                      'title': f['title'],
                      'field_type': map_field_type(f['fieldType']),
                      'value': f.get('value', ''),
                  }
                  section_id = f.get('sectionId')
                  if section_id:
                      kwargs['section_id'] = section_id
                  
                  item_fields.append(ItemField(**kwargs))
                  log_secure('DEBUG', 'Built ItemField',
                             field_id=f['id'],
                             field_type=f['fieldType'],
                             has_section=bool(section_id))
              return item_fields
          
          def collect_sections(raw_fields):
              """Build ItemSection list from sectionId references in fields."""
              section_titles = {
                  'details': 'Additional Details',
                  'contactInfo': 'Contact Information',
                  'attachments': 'Attachments',
              }
              seen = set()
              sections = []
              for f in raw_fields:
                  sid = f.get('sectionId')
                  if sid and sid not in seen:
                      seen.add(sid)
                      sections.append(ItemSection(
                          id=sid,
                          title=section_titles.get(sid, sid)
                      ))
              return sections
          
          # Build category mapping dynamically
          _CATEGORY_MAP = None
          
          def _build_category_map():
              global _CATEGORY_MAP
              if _CATEGORY_MAP is not None:
                  return _CATEGORY_MAP
              members = {name: val for name, val in vars(ItemCategory).items()
                         if not name.startswith('_')}
              log_secure('INFO', 'Available ItemCategory members',
                         members=list(members.keys()))
              ci = {}
              for name, val in members.items():
                  ci[name.lower()] = val
              _CATEGORY_MAP = ci
              return _CATEGORY_MAP
          
          def map_category(category_str):
              """Map frontend category string to SDK ItemCategory enum."""
              cat_map = _build_category_map()
              result = cat_map.get(category_str.lower())
              if result is None:
                  log_secure('WARN', f'Unknown category: {category_str}',
                             available=list(cat_map.keys()))
                  return category_str
              return result
          
          CC_BUILTIN_IDS = {'cardholder', 'type', 'ccnum', 'cvv', 'expiry', 'validFrom'}
          
          async def create_item_in_1password(vault_id, item_data):
              """Create item in 1Password using SDK"""
              
              op_response = secrets_client.get_secret_value(SecretId=os.environ['OP_SECRET_ARN'])
              op_token = op_response['SecretString']
              
              client = await Client.authenticate(
                  auth=op_token,
                  integration_name="Secure Item Creator",
                  integration_version="1.0"
              )
              
              category = map_category(item_data['category'])
              
              log_secure('INFO', 'Creating item', 
                         title=item_data['title'], 
                         category_raw=item_data['category'],
                         category_mapped=str(category),
                         num_fields=len(item_data.get('fields', [])),
                         num_tags=len(item_data.get('tags', [])),
                         tags=item_data.get('tags', []),
                         has_notes=bool(item_data.get('notes')))
              
              category_lower = item_data['category'].lower()
              
              # ============================================================
              # DOCUMENT CATEGORY
              # ============================================================
              if category_lower == 'document':
                  if 'attachment' not in item_data or not item_data['attachment'].get('content'):
                      raise Exception('Document items require a file attachment')
                  
                  file_content = base64.b64decode(item_data['attachment']['content'])
                  
                  create_params = {
                      'title': item_data['title'],
                      'category': category,
                      'vault_id': vault_id,
                      'sections': [ItemSection(id='', title='')],
                      'document': DocumentCreateParams(
                          name=item_data['attachment']['filename'],
                          content=file_content
                      ),
                  }
                  
                  if item_data.get('fields'):
                      builtin_fields = []
                      for f in item_data['fields']:
                          builtin_fields.append(ItemField(
                              id=f['id'],
                              title=f['title'],
                              field_type=map_field_type(f['fieldType']),
                              value=f.get('value', ''),
                              section_id="",
                          ))
                      create_params['fields'] = builtin_fields
                  
                  if item_data.get('notes'):
                      create_params['notes'] = item_data['notes']
                  
                  tags = item_data.get('tags', [])
                  if tags:
                      create_params['tags'] = tags
                  
                  log_secure('INFO', f'Creating Document with file: {item_data["attachment"]["filename"]}')
                  
                  to_create = ItemCreateParams(**create_params)
                  created_item = await client.items.create(to_create)
                  
                  log_secure('INFO', 'Document created', item_id=created_item.id)
                  
                  del op_token
                  return created_item.id
              
              # ============================================================
              # BUILT-IN FIELD CATEGORIES
              # ============================================================
              BUILTIN_CATEGORIES = {
                  'creditcard', 'apicredentials', 'database', 
                  'router', 'softwarelicense'
              }
              
              SECTIONED_CATEGORIES = {'server'}
              
              uses_builtin_fields = category_lower in BUILTIN_CATEGORIES
              uses_sections = category_lower in SECTIONED_CATEGORIES
              
              if uses_builtin_fields:
                  builtin_fields = []
                  for f in item_data.get('fields', []):
                      builtin_fields.append(ItemField(
                          id=f['id'],
                          title=f['title'],
                          field_type=map_field_type(f['fieldType']),
                          value=f.get('value', ''),
                          section_id="",
                      ))
                      log_secure('DEBUG', f'Built-in field: {f["id"]} with section_id=""')
                  
                  builtin_sections = [
                      ItemSection(id='', title=''),
                  ]
                  
                  if category_lower == 'creditcard':
                      has_details = any(f.get('sectionId') == 'details' for f in item_data.get('fields', []))
                      has_contact = any(f.get('sectionId') == 'contactInfo' for f in item_data.get('fields', []))
                      
                      if has_details or has_contact:
                          builtin_fields = []
                          for f in item_data.get('fields', []):
                              sid = f.get('sectionId', '')
                              builtin_fields.append(ItemField(
                                  id=f['id'],
                                  title=f['title'],
                                  field_type=map_field_type(f['fieldType']),
                                  value=f.get('value', ''),
                                  section_id=sid if sid else "",
                              ))
                          
                          if has_details:
                              builtin_sections.append(ItemSection(id='details', title='Additional Details'))
                          if has_contact:
                              builtin_sections.append(ItemSection(id='contactInfo', title='Contact Information'))
                  
                  create_params = {
                      'title': item_data['title'],
                      'category': category,
                      'vault_id': vault_id,
                      'fields': builtin_fields,
                      'sections': builtin_sections,
                  }
                  
                  if item_data.get('notes'):
                      create_params['notes'] = item_data['notes']
                  
                  tags = item_data.get('tags', [])
                  if tags:
                      create_params['tags'] = tags
                  
                  if 'attachment' in item_data and item_data['attachment'].get('content'):
                      file_content = base64.b64decode(item_data['attachment']['content'])
                      create_params['files'] = [{
                          'name': item_data['attachment']['filename'],
                          'content': file_content,
                          'sectionId': '',
                          'fieldId': 'attachment'
                      }]
                      log_secure('INFO', 'File attachment prepared',
                                 filename=item_data['attachment']['filename'])
                  
                  log_secure('INFO', f'Creating {category_lower} with {len(builtin_fields)} fields, {len(builtin_sections)} sections')
                  
                  to_create = ItemCreateParams(**create_params)
                  created_item = await client.items.create(to_create)
                  
                  log_secure('INFO', 'Item created', item_id=created_item.id, category=category_lower)
                  
                  del op_token
                  return created_item.id
              
              if uses_sections:
                  # ============================================================
                  # SERVER
                  # ============================================================
                  server_fields = []
                  server_sections_used = set()
                  
                  for f in item_data.get('fields', []):
                      if 'sectionId' in f and f['sectionId']:
                          sid = f['sectionId']
                          server_fields.append(ItemField(
                              id=f['id'],
                              title=f['title'],
                              field_type=map_field_type(f['fieldType']),
                              value=f.get('value', ''),
                              section_id=sid,
                          ))
                          server_sections_used.add(sid)
                          log_secure('DEBUG', f'Server section field: {f["id"]} section={sid!r}')
                      else:
                          field_kwargs = {
                              'id': f['id'],
                              'title': f['title'],
                              'field_type': map_field_type(f['fieldType']),
                              'value': f.get('value', ''),
                          }
                          server_fields.append(ItemField(**field_kwargs))
                          log_secure('DEBUG', f'Server default field: {f["id"]} (no section)')
                  
                  server_sections = []
                  has_default_fields = any('sectionId' not in f or not f['sectionId'] 
                                          for f in item_data.get('fields', []))
                  
                  if has_default_fields:
                      server_sections.append(ItemSection(id='', title=''))
                  
                  section_titles = {
                      'admin_console': 'Admin Console',
                      'hosting_provider_details': 'Hosting Provider',
                  }
                  
                  for sid in sorted(server_sections_used):
                      server_sections.append(ItemSection(
                          id=sid,
                          title=section_titles.get(sid, sid)
                      ))
                  
                  create_params = {
                      'title': item_data['title'],
                      'category': category,
                      'vault_id': vault_id,
                      'fields': server_fields,
                      'sections': server_sections,
                  }
                  
                  if item_data.get('notes'):
                      create_params['notes'] = item_data['notes']
                  
                  tags = item_data.get('tags', [])
                  if tags:
                      create_params['tags'] = tags
                  
                  if 'attachment' in item_data and item_data['attachment'].get('content'):
                      file_content = base64.b64decode(item_data['attachment']['content'])
                      create_params['files'] = [{
                          'name': item_data['attachment']['filename'],
                          'content': file_content,
                          'sectionId': '',
                          'fieldId': 'attachment'
                      }]
                      log_secure('INFO', 'File attachment prepared',
                                 filename=item_data['attachment']['filename'])
                  
                  log_secure('INFO', f'Creating Server with {len(server_fields)} fields, {len(server_sections)} sections')
                  
                  to_create = ItemCreateParams(**create_params)
                  created_item = await client.items.create(to_create)
                  
                  log_secure('INFO', 'Server item created', item_id=created_item.id)
                  
                  del op_token
                  return created_item.id
              
              # ============================================================
              # STANDARD CATEGORIES: Login, SecureNote, etc.
              # ============================================================
              
              item_fields = build_item_fields(item_data.get('fields', []))
              sections = collect_sections(item_data.get('fields', []))
              
              files = []
              if 'attachment' in item_data and item_data['attachment'].get('content'):
                  file_content = base64.b64decode(item_data['attachment']['content'])
                  files.append({
                      'name': item_data['attachment']['filename'],
                      'content': file_content,
                      'sectionId': 'attachments',
                      'fieldId': 'attachment_field'
                  })
                  log_secure('INFO', 'File attachment prepared',
                             filename=item_data['attachment']['filename'])
              
              create_params = {
                  'title': item_data['title'],
                  'category': category,
                  'vault_id': vault_id,
                  'fields': item_fields,
              }
              
              if sections:
                  create_params['sections'] = sections
              
              if item_data.get('notes'):
                  create_params['notes'] = item_data['notes']
                  log_secure('INFO', 'Adding notes to item',
                             notes_length=len(item_data['notes']))
              
              tags = item_data.get('tags', [])
              if tags:
                  create_params['tags'] = tags
                  log_secure('INFO', 'Adding tags to item', tags=tags)
              
              if files:
                  has_attach_section = any(s.id == 'attachments' for s in sections)
                  if not has_attach_section:
                      if 'sections' not in create_params:
                          create_params['sections'] = []
                      create_params['sections'].append(
                          ItemSection(id='attachments', title='Attachments'))
                  create_params['files'] = files
              
              log_secure('INFO', 'Creating item with params',
                         category=str(create_params['category']),
                         has_tags='tags' in create_params,
                         has_notes='notes' in create_params,
                         num_sections=len(create_params.get('sections', [])),
                         num_fields=len(create_params.get('fields', [])))
              
              to_create = ItemCreateParams(**create_params)
              created_item = await client.items.create(to_create)
              
              log_secure('INFO', 'Item created successfully',
                         item_id=created_item.id)
              
              del op_token
              
              return created_item.id
          
          def lambda_handler(event, context):
              headers = make_headers()
              
              try:
                  install_sdk()
                  
                  if not event.get('body'):
                      return {
                          'statusCode': 400,
                          'headers': headers,
                          'body': json.dumps({'error': 'Missing request body'})
                      }
                  
                  body = json.loads(event['body'])
                  
                  if 'encryptedPayload' not in body:
                      return {
                          'statusCode': 400,
                          'headers': headers,
                          'body': json.dumps({'error': 'Missing encrypted payload'})
                      }
                  
                  encrypted_payload = body['encryptedPayload']
                  
                  log_secure('INFO', 'Received encrypted request')
                  
                  rsa_response = secrets_client.get_secret_value(
                      SecretId=os.environ['RSA_SECRET_ARN']
                  )
                  keys = json.loads(rsa_response['SecretString'])
                  private_key = keys['private_key']
                  
                  decrypted_json = decrypt_rsa(encrypted_payload, private_key)
                  decrypted_data = json.loads(decrypted_json)
                  
                  del private_key
                  del encrypted_payload
                  
                  log_secure('INFO', 'Payload decrypted successfully')
                  
                  required_fields = ['title', 'category', 'fields']
                  missing = [f for f in required_fields if f not in decrypted_data]
                  if missing:
                      return {
                          'statusCode': 400,
                          'headers': headers,
                          'body': json.dumps({'error': f'Missing fields: {", ".join(missing)}'})
                      }
                  
                  import asyncio
                  item_id = asyncio.run(create_item_in_1password(
                      os.environ['VAULT_ID'],
                      decrypted_data
                  ))
                  
                  del decrypted_data
                  
                  log_secure('INFO', 'Item created successfully', itemId=item_id)
                  
                  return {
                      'statusCode': 200,
                      'headers': headers,
                      'body': json.dumps({
                          'success': True,
                          'message': 'Item created successfully',
                          'itemId': item_id
                      })
                  }
                  
              except Exception as e:
                  log_secure('ERROR', 'Failed to create item',
                             error=str(e),
                             traceback=traceback.format_exc())
                  
                  return {
                      'statusCode': 500,
                      'headers': headers,
                      'body': json.dumps({
                          'error': 'Internal server error. Check CloudWatch logs for details.'
                      })
                  }
