  GenerateCredentialLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-generate-credential"
      Description: "v3-okta-reset-encrypted-preview"
      Handler: index.lambda_handler
      Role: !GetAtt GenerateCredentialRole.Arn
      Runtime: python3.12
      MemorySize: 1024
      Timeout: 60
      Layers:
        - !GetAtt SDKLayer.LayerVersionArn
      Environment:
        Variables:
          SECRET_NAME: !Ref OPSecret
          VAULT_ID: !Ref SourceVaultID
          SENDER_EMAIL: !Ref SenderEmail
          ORIGIN_VERIFY_SECRET_NAME: !Ref OriginVerifySecret
          OKTA_TOKEN_SECRET: !If [HasOkta, !Ref OktaTokenSecret, ""]
          OKTA_ORG_URL_SECRET: !If [HasOkta, !Ref OktaOrgUrlSecret, ""]
          OKTA_ENABLED: !If [HasOkta, "true", "false"]
          ALLOWED_ORIGIN: !If
            - UseCustomDomain
            - !Sub "https://${CustomDomainName}"
            - !Sub "https://${CloudFrontDistribution.DomainName}"
      Code:
        ZipFile: |
          import json
          import os
          import re
          import sys
          import time
          import asyncio
          import traceback
          import base64
          import urllib.request
          import urllib.error
          import urllib.parse

          import boto3

          secrets_client = boto3.client('secretsmanager')
          ses = boto3.client('ses')

          # ── Secrets cache ─────────────────────────────────────────────────
          _secrets_cache = {}
          _CACHE_TTL = 300

          def get_cached_secret(secret_id):
              now = time.time()
              cached = _secrets_cache.get(secret_id)
              if cached and (now - cached['ts']) < _CACHE_TTL:
                  return cached['value']
              value = secrets_client.get_secret_value(SecretId=secret_id)['SecretString']
              _secrets_cache[secret_id] = {'value': value, 'ts': now}
              return value

          # ── Structured logger ─────────────────────────────────────────────
          class Logger:
              def __init__(self):
                  self.request_id = None
              def set_context(self, context):
                  self.request_id = getattr(context, 'aws_request_id', 'unknown')
              def _emit(self, level, message, **extra):
                  record = {
                      'timestamp': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
                      'level': level,
                      'requestId': self.request_id,
                      'message': message,
                  }
                  record.update(extra)
                  print(json.dumps(record), flush=True)
              def info(self, msg, **kw):  self._emit('INFO', msg, **kw)
              def warn(self, msg, **kw):  self._emit('WARN', msg, **kw)
              def error(self, msg, **kw): self._emit('ERROR', msg, **kw)

          log = Logger()

          # ── Client-side encryption helpers (X25519 + AES-256-GCM) ─────────
          def encrypt_for_client(plaintext, client_public_key_b64):
              from cryptography.hazmat.primitives.asymmetric.x25519 import (
                  X25519PrivateKey, X25519PublicKey
              )
              from cryptography.hazmat.primitives.ciphers.aead import AESGCM
              from cryptography.hazmat.primitives.kdf.hkdf import HKDF
              from cryptography.hazmat.primitives import hashes

              client_pub_bytes = base64.b64decode(client_public_key_b64)
              client_pub = X25519PublicKey.from_public_bytes(client_pub_bytes)
              ephemeral_private = X25519PrivateKey.generate()
              ephemeral_public = ephemeral_private.public_key()
              shared_secret = ephemeral_private.exchange(client_pub)
              derived_key = HKDF(
                  algorithm=hashes.SHA256(), length=32, salt=None,
                  info=b'credgen-password-encryption',
              ).derive(shared_secret)
              aesgcm = AESGCM(derived_key)
              nonce = os.urandom(12)
              ciphertext = aesgcm.encrypt(nonce, plaintext.encode('utf-8'), None)
              eph_pub_bytes = ephemeral_public.public_bytes_raw()
              return {
                  'ephemeralPublicKey': base64.b64encode(eph_pub_bytes).decode(),
                  'nonce': base64.b64encode(nonce).decode(),
                  'ciphertext': base64.b64encode(ciphertext).decode(),
              }

          # ── Share duration mapping ────────────────────────────────────────
          SHARE_DURATION_MAP = {
              'OneHour': 'OneHour',
              'OneDay': 'OneDay',
              'SevenDays': 'SevenDays',
              'FourteenDays': 'FourteenDays',
              'ThirtyDays': 'ThirtyDays',
          }

          DURATION_LABELS = {
              'OneHour': '1 hour',
              'OneDay': '24 hours',
              'SevenDays': '7 days',
              'FourteenDays': '14 days',
              'ThirtyDays': '30 days',
          }

          # ── Max password length for Okta modes ───────────────────────────
          OKTA_MAX_PASSWORD_LENGTH = 72

          def clamp_okta_recipe(recipe):
              """Enforce 72-char max on Okta password recipes."""
              recipe = dict(recipe)
              if recipe.get('type') == 'random':
                  length = int(recipe.get('length', 20))
                  recipe['length'] = min(length, OKTA_MAX_PASSWORD_LENGTH)
              elif recipe.get('type') == 'pin':
                  length = int(recipe.get('length', 6))
                  recipe['length'] = min(length, OKTA_MAX_PASSWORD_LENGTH)
              return recipe

          # ── Okta user creation via REST API ──────────────────────────────
          def create_okta_user(okta_org_url, okta_api_token, username,
                               login_email, first_name, last_name, password):
              """Create a user in Okta via the Users API. Returns the user ID."""
              url = f"{okta_org_url.rstrip('/')}/api/v1/users?activate=true"
              payload = {
                  "profile": {
                      "firstName": first_name,
                      "lastName": last_name,
                      "email": login_email,
                      "login": login_email
                  },
                  "credentials": {
                      "password": {"value": password}
                  }
              }
              # If username differs from email, set it as the login
              if username and username != login_email:
                  payload["profile"]["login"] = username
              data = json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, method='POST', headers={
                  'Accept': 'application/json',
                  'Content-Type': 'application/json',
                  'Authorization': f'SSWS {okta_api_token}'
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      body = json.loads(resp.read().decode('utf-8'))
                      return body.get('id')
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8')
                  log.error("Okta API error", status=e.code, body=error_body)
                  raise RuntimeError(
                      f"Okta user creation failed ({e.code}): {error_body}")

          # ── Okta user lookup via REST API ─────────────────────────────────
          def get_okta_user(okta_org_url, okta_api_token, login):
              """Look up an Okta user by login. Returns user dict or None."""
              encoded_login = urllib.parse.quote(login, safe='')
              url = f"{okta_org_url.rstrip('/')}/api/v1/users/{encoded_login}"
              req = urllib.request.Request(url, method='GET', headers={
                  'Accept': 'application/json',
                  'Content-Type': 'application/json',
                  'Authorization': f'SSWS {okta_api_token}'
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      return None
                  error_body = e.read().decode('utf-8')
                  log.error("Okta user lookup error", status=e.code,
                            body=error_body)
                  raise RuntimeError(
                      f"Okta user lookup failed ({e.code}): {error_body}")

          # ── Okta password reset via REST API ──────────────────────────────
          def reset_okta_user_password(okta_org_url, okta_api_token,
                                       user_id, new_password):
              """Set a new password for an existing Okta user."""
              url = (f"{okta_org_url.rstrip('/')}/api/v1/users/{user_id}")
              payload = {
                  "credentials": {
                      "password": {"value": new_password}
                  }
              }
              data = json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, method='POST', headers={
                  'Accept': 'application/json',
                  'Content-Type': 'application/json',
                  'Authorization': f'SSWS {okta_api_token}'
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8')
                  log.error("Okta password reset error", status=e.code,
                            body=error_body)
                  raise RuntimeError(
                      f"Okta password reset failed ({e.code}): {error_body}")

          # ── 1Password item creation + share ────────────────────────────────
          async def run(user_name, user_email, password_recipe,
                        username=None, url=None, share_duration='OneHour'):
              from onepassword import Client, ItemShareParams
              import onepassword.items as items_module

              token = get_cached_secret(os.environ['SECRET_NAME'])
              client = await Client.authenticate(
                  auth=token,
                  integration_name="Temp Cred Gen",
                  integration_version="3.0"
              )

              password = generate_password_only_internal(password_recipe)

              fields_list = []
              if username:
                  fields_list.append({
                      'id': 'username', 'title': 'username',
                      'fieldType': 'Text', 'value': username})
              fields_list.append({
                  'id': 'password', 'title': 'password',
                  'fieldType': 'Concealed', 'value': password})
              if url:
                  fields_list.append({
                      'id': 'url', 'title': 'website',
                      'fieldType': 'Url', 'value': url})

              created_item = await client.items.create(
                  items_module.ItemCreateParams(
                      title="Temporary Access - " + user_name,
                      category='Login',
                      vault_id=os.environ['VAULT_ID'],
                      fields=fields_list
                  )
              )
              item_id = created_item.id
              log.info("Created 1Password item", itemId=item_id)

              try:
                  item = await client.items.get(os.environ['VAULT_ID'], item_id)
                  policy = await client.items.shares.get_account_policy(
                      item.vault_id, item.id)
                  valid_recipients = await client.items.shares.validate_recipients(
                      policy, [user_email])

                  expire = SHARE_DURATION_MAP.get(share_duration, 'OneHour')
                  share_link = await client.items.shares.create(
                      item, policy,
                      ItemShareParams(recipients=valid_recipients,
                                      expire_after=expire, one_time_only=True)
                  )
                  log.info("Generated share link", itemId=item_id, duration=expire)
                  await client.items.delete(os.environ['VAULT_ID'], item_id)
                  log.info("Deleted item after sharing", itemId=item_id)
                  return share_link
              except Exception as e:
                  try:
                      await client.items.delete(os.environ['VAULT_ID'], item_id)
                      log.warn("Cleaned up item after error", itemId=item_id)
                  except Exception:
                      pass
                  raise

          # ── Okta mode: create user + 1Password share ──────────────────────
          async def run_okta(okta_username, okta_login, first_name, last_name,
                             destination_email, password_recipe,
                             share_duration='OneHour'):
              from onepassword import Client, ItemShareParams
              import onepassword.items as items_module

              okta_token_secret = os.environ.get('OKTA_TOKEN_SECRET', '')
              okta_org_url_secret = os.environ.get('OKTA_ORG_URL_SECRET', '')
              if not okta_token_secret or not okta_org_url_secret:
                  raise RuntimeError("Okta integration is not configured")
              okta_api_token = get_cached_secret(okta_token_secret)
              okta_org_url = get_cached_secret(okta_org_url_secret)

              token = get_cached_secret(os.environ['SECRET_NAME'])
              client = await Client.authenticate(
                  auth=token,
                  integration_name="Temp Cred Gen Okta",
                  integration_version="3.0"
              )

              # Clamp password to 72 chars for Okta
              clamped_recipe = clamp_okta_recipe(password_recipe)
              password = generate_password_only_internal(clamped_recipe)
              log.info("Generated password for Okta user",
                       username=okta_username, login=okta_login)

              okta_user_id = create_okta_user(
                  okta_org_url, okta_api_token, okta_username,
                  okta_login, first_name, last_name, password
              )
              log.info("Created Okta user", oktaUserId=okta_user_id,
                       login=okta_login)

              display_name = f"{first_name} {last_name}"
              fields_list = [
                  {'id': 'username', 'title': 'username',
                   'fieldType': 'Text', 'value': okta_username},
                  {'id': 'password', 'title': 'password',
                   'fieldType': 'Concealed', 'value': password},
                  {'id': 'url', 'title': 'website',
                   'fieldType': 'Url', 'value': okta_org_url},
              ]
              # Add email as a note if it differs from username
              if okta_login != okta_username:
                  fields_list.append({
                      'id': 'email', 'title': 'email',
                      'fieldType': 'Text', 'value': okta_login})

              created_item = await client.items.create(
                  items_module.ItemCreateParams(
                      title=f"Okta Credentials - {display_name}",
                      category='Login',
                      vault_id=os.environ['VAULT_ID'],
                      fields=fields_list
                  )
              )
              item_id = created_item.id
              log.info("Created 1Password item for Okta creds", itemId=item_id)

              try:
                  item = await client.items.get(os.environ['VAULT_ID'], item_id)
                  policy = await client.items.shares.get_account_policy(
                      item.vault_id, item.id)
                  valid_recipients = await client.items.shares.validate_recipients(
                      policy, [destination_email])

                  expire = SHARE_DURATION_MAP.get(share_duration, 'OneHour')
                  share_link = await client.items.shares.create(
                      item, policy,
                      ItemShareParams(recipients=valid_recipients,
                                      expire_after=expire, one_time_only=True)
                  )
                  log.info("Generated Okta share link", itemId=item_id,
                           duration=expire)
                  await client.items.delete(os.environ['VAULT_ID'], item_id)
                  log.info("Deleted 1Password item after Okta sharing",
                           itemId=item_id)
                  return share_link
              except Exception as e:
                  try:
                      await client.items.delete(os.environ['VAULT_ID'], item_id)
                  except Exception:
                      pass
                  raise

          # ── Okta reset mode: reset password + 1Password share ─────────────
          async def run_okta_reset(okta_login, destination_email,
                                   password_recipe,
                                   share_duration='OneHour'):
              from onepassword import Client, ItemShareParams
              import onepassword.items as items_module

              okta_token_secret = os.environ.get('OKTA_TOKEN_SECRET', '')
              okta_org_url_secret = os.environ.get('OKTA_ORG_URL_SECRET', '')
              if not okta_token_secret or not okta_org_url_secret:
                  raise RuntimeError("Okta integration is not configured")
              okta_api_token = get_cached_secret(okta_token_secret)
              okta_org_url = get_cached_secret(okta_org_url_secret)

              # Look up user
              user = get_okta_user(okta_org_url, okta_api_token, okta_login)
              if not user:
                  raise RuntimeError(
                      f"Okta user not found: {okta_login}")
              okta_user_id = user['id']
              first_name = user.get('profile', {}).get('firstName', '')
              last_name = user.get('profile', {}).get('lastName', '')
              okta_username = user.get('profile', {}).get('login', okta_login)
              log.info("Found Okta user for reset",
                       oktaUserId=okta_user_id, login=okta_login)

              token = get_cached_secret(os.environ['SECRET_NAME'])
              client = await Client.authenticate(
                  auth=token,
                  integration_name="Temp Cred Gen Okta Reset",
                  integration_version="3.0"
              )

              # Clamp password to 72 chars for Okta
              clamped_recipe = clamp_okta_recipe(password_recipe)
              password = generate_password_only_internal(clamped_recipe)
              log.info("Generated reset password for Okta user",
                       login=okta_login)

              # Update the password in Okta
              reset_okta_user_password(
                  okta_org_url, okta_api_token,
                  okta_user_id, password
              )
              log.info("Reset Okta password", oktaUserId=okta_user_id,
                       login=okta_login)

              display_name = f"{first_name} {last_name}".strip() or okta_login
              fields_list = [
                  {'id': 'username', 'title': 'username',
                   'fieldType': 'Text', 'value': okta_username},
                  {'id': 'password', 'title': 'password',
                   'fieldType': 'Concealed', 'value': password},
                  {'id': 'url', 'title': 'website',
                   'fieldType': 'Url', 'value': okta_org_url},
              ]

              created_item = await client.items.create(
                  items_module.ItemCreateParams(
                      title=f"Okta Password Reset - {display_name}",
                      category='Login',
                      vault_id=os.environ['VAULT_ID'],
                      fields=fields_list
                  )
              )
              item_id = created_item.id
              log.info("Created 1Password item for Okta reset",
                       itemId=item_id)

              try:
                  item = await client.items.get(os.environ['VAULT_ID'], item_id)
                  policy = await client.items.shares.get_account_policy(
                      item.vault_id, item.id)
                  valid_recipients = await client.items.shares.validate_recipients(
                      policy, [destination_email])

                  expire = SHARE_DURATION_MAP.get(share_duration, 'OneHour')
                  share_link = await client.items.shares.create(
                      item, policy,
                      ItemShareParams(recipients=valid_recipients,
                                      expire_after=expire, one_time_only=True)
                  )
                  log.info("Generated Okta reset share link",
                           itemId=item_id, duration=expire)
                  await client.items.delete(os.environ['VAULT_ID'], item_id)
                  log.info("Deleted 1Password item after Okta reset sharing",
                           itemId=item_id)
                  return share_link, display_name, okta_username
              except Exception as e:
                  try:
                      await client.items.delete(os.environ['VAULT_ID'], item_id)
                  except Exception:
                      pass
                  raise

          def generate_password_only_internal(password_recipe):
              from onepassword.secrets import Secrets
              from onepassword.types import (
                  PasswordRecipePin, PasswordRecipePinInner,
                  PasswordRecipeRandom, PasswordRecipeRandomInner,
                  PasswordRecipeMemorable, PasswordRecipeMemorableInner,
                  SeparatorType, WordListType
              )
              recipe_type = password_recipe.get('type', 'random')
              if recipe_type == 'pin':
                  result = Secrets.generate_password(
                      PasswordRecipePin(parameters=PasswordRecipePinInner(
                          length=int(password_recipe.get('length', 6))
                      ))
                  )
              elif recipe_type == 'memorable':
                  sep_map = {
                      'hyphens': SeparatorType.HYPHENS,
                      'underscores': SeparatorType.UNDERSCORES,
                      'spaces': SeparatorType.SPACES,
                      'periods': SeparatorType.PERIODS,
                      'commas': SeparatorType.COMMAS,
                      'digits': SeparatorType.DIGITS,
                      'digitsAndSymbols': SeparatorType.DIGITSANDSYMBOLS,
                  }
                  wl_map = {
                      'syllables': WordListType.SYLLABLES,
                      'fullWords': WordListType.FULLWORDS,
                      'threeLetters': WordListType.THREELETTERS,
                  }
                  result = Secrets.generate_password(
                      PasswordRecipeMemorable(parameters=PasswordRecipeMemorableInner(
                          separator_type=sep_map.get(
                              password_recipe.get('separatorType', 'hyphens'),
                              SeparatorType.HYPHENS),
                          word_list_type=wl_map.get(
                              password_recipe.get('wordListType', 'syllables'),
                              WordListType.SYLLABLES),
                          capitalize=bool(password_recipe.get('capitalize', True)),
                          word_count=int(password_recipe.get('wordCount', 4)),
                      ))
                  )
              else:
                  result = Secrets.generate_password(
                      PasswordRecipeRandom(parameters=PasswordRecipeRandomInner(
                          length=int(password_recipe.get('length', 20)),
                          include_digits=bool(password_recipe.get('includeDigits', True)),
                          include_symbols=bool(password_recipe.get('includeSymbols', True)),
                      ))
                  )
              return result.password

          def lambda_handler(event, context):
              log.set_context(context)
              allowed_origin = os.environ.get('ALLOWED_ORIGIN', '')
              headers = {
                  'Access-Control-Allow-Origin': allowed_origin,
                  'Access-Control-Allow-Headers': 'Content-Type',
                  'Access-Control-Allow-Methods': 'OPTIONS,POST',
                  'Content-Type': 'application/json',
                  'Vary': 'Origin',
              }

              try:
                  # Validate CloudFront origin secret header
                  expected_secret = get_cached_secret(
                      os.environ['ORIGIN_VERIFY_SECRET_NAME'])
                  expected_header = json.loads(expected_secret).get(
                      'headerValue', '')
                  raw_headers = event.get('headers') or {}
                  incoming_header = next(
                      (v for k, v in raw_headers.items()
                       if k.lower() == 'x-origin-verify'), ''
                  )
                  if not incoming_header or incoming_header != expected_header:
                      log.warn("Rejected: invalid X-Origin-Verify",
                               sourceIp=raw_headers.get('X-Forwarded-For',
                                                         'unknown'))
                      return {'statusCode': 403, 'headers': headers,
                              'body': json.dumps({'message': 'Forbidden'})}

                  if not event.get('body'):
                      return {'statusCode': 400, 'headers': headers,
                              'body': json.dumps(
                                  {'message': 'Missing request body'})}

                  body = json.loads(event['body'])
                  share_duration = body.get('_shareDuration', 'OneHour')
                  if share_duration not in SHARE_DURATION_MAP:
                      share_duration = 'OneHour'

                  client_encrypted = bool(body.get('_encrypted'))
                  client_public_key = body.get('_clientPublicKey', '')

                  # ── Preview-only mode ─────────────────────────────────────
                  if body.get('_previewOnly'):
                      recipe = body.get('passwordRecipe')
                      if not recipe:
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps(
                                      {'message': 'Missing passwordRecipe'})}
                      password = generate_password_only_internal(recipe)
                      log.info("Preview password generated",
                               recipeType=recipe.get('type'),
                               encrypted=client_encrypted)
                      if client_encrypted and client_public_key:
                          envelope = encrypt_for_client(
                              password, client_public_key)
                          return {'statusCode': 200, 'headers': headers,
                                  'body': json.dumps({'encrypted': envelope})}
                      return {'statusCode': 200, 'headers': headers,
                              'body': json.dumps({'password': password})}

                  # ── Okta Reset mode ──────────────────────────────────────
                  if body.get('_oktaResetMode'):
                      if os.environ.get('OKTA_ENABLED') != 'true':
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Okta integration is not '
                                                 'enabled on this deployment',
                                      'oktaDisabled': True})}

                      okta_login = (body.get('_oktaLogin') or '').strip()
                      dest_email = (body.get('_destinationEmail') or '').strip()
                      recipe = body.get('passwordRecipe')

                      missing = []
                      if not okta_login: missing.append('Okta Login')
                      if not dest_email: missing.append('Recipient Email')
                      if not recipe: missing.append('Password Recipe')
                      if missing:
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Missing: ' +
                                                 ', '.join(missing)})}

                      if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$',
                                      okta_login):
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Invalid Okta login email'})}
                      if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$',
                                      dest_email):
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Invalid recipient email'})}

                      log.info("Processing Okta password reset",
                               oktaLogin=okta_login,
                               destinationEmail=dest_email)

                      try:
                          share_url, display_name, okta_username = asyncio.run(
                              run_okta_reset(
                                  okta_login, dest_email,
                                  recipe, share_duration
                              ))
                      except RuntimeError as e:
                          error_msg = str(e)
                          log.error("Okta reset flow failed",
                                    error=error_msg)
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': error_msg[:300]})}

                      duration_label = DURATION_LABELS.get(
                          share_duration, '1 hour')
                      email_body = '\n'.join([
                          "Okta Password Reset",
                          "",
                          f"Hello {display_name},",
                          "",
                          "Your Okta password has been reset. Click the "
                          "link below to access your new credentials:",
                          "",
                          share_url,
                          "",
                          "IMPORTANT SECURITY NOTES:",
                          f"- This link expires in {duration_label}",
                          "- This link can only be viewed ONCE",
                          "- After viewing, the link becomes invalid",
                          "- Save the password immediately",
                          "",
                          "Your Okta login is: " + okta_login,
                          "",
                          "The credential will be permanently deleted "
                          "after you view it.",
                          "",
                          "---",
                          "This is an automated message from the "
                          "Temporary Credential Generator."
                      ])

                      ses.send_email(
                          Source=os.environ['SENDER_EMAIL'],
                          Destination={'ToAddresses': [dest_email]},
                          Message={
                              'Subject': {
                                  'Data': f'Okta Password Reset for '
                                          f'{display_name}'},
                              'Body': {'Text': {'Data': email_body}}
                          }
                      )
                      log.info("Sent Okta reset share link via email",
                               destinationEmail=dest_email)

                      return {'statusCode': 200, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'Okta password reset and '
                                             'new credentials sent',
                                  'email': dest_email,
                                  'oktaLogin': okta_login,
                                  'displayName': display_name})}

                  # ── Okta mode ─────────────────────────────────────────────
                  if body.get('_oktaMode'):
                      if os.environ.get('OKTA_ENABLED') != 'true':
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Okta integration is not '
                                                 'enabled on this deployment',
                                      'oktaDisabled': True})}

                      okta_username = (body.get('_oktaUsername') or '').strip()
                      okta_login = (body.get('_oktaLogin') or '').strip()
                      first_name = (body.get('_oktaFirstName') or '').strip()
                      last_name = (body.get('_oktaLastName') or '').strip()
                      dest_email = (body.get('_destinationEmail') or '').strip()
                      recipe = body.get('passwordRecipe')

                      missing = []
                      if not okta_username: missing.append('Okta Username')
                      if not okta_login: missing.append('Okta Email')
                      if not first_name: missing.append('First Name')
                      if not last_name: missing.append('Last Name')
                      if not dest_email: missing.append('Recipient Email')
                      if not recipe: missing.append('Password Recipe')
                      if missing:
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Missing: ' +
                                                 ', '.join(missing)})}

                      if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$',
                                      okta_login):
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Invalid Okta email'})}
                      if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$',
                                      dest_email):
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': 'Invalid recipient email'})}

                      log.info("Processing Okta credential",
                               oktaUsername=okta_username,
                               oktaLogin=okta_login,
                               destinationEmail=dest_email)

                      try:
                          share_url = asyncio.run(run_okta(
                              okta_username, okta_login,
                              first_name, last_name,
                              dest_email, recipe, share_duration
                          ))
                      except RuntimeError as e:
                          error_msg = str(e)
                          log.error("Okta flow failed", error=error_msg)
                          return {'statusCode': 400, 'headers': headers,
                                  'body': json.dumps({
                                      'message': error_msg[:300]})}

                      duration_label = DURATION_LABELS.get(
                          share_duration, '1 hour')
                      email_body = '\n'.join([
                          "Okta Account Credentials",
                          "",
                          f"Hello {first_name},",
                          "",
                          "Your Okta account has been created. Click the "
                          "link below to access your credentials:",
                          "",
                          share_url,
                          "",
                          "IMPORTANT SECURITY NOTES:",
                          f"- This link expires in {duration_label}",
                          "- This link can only be viewed ONCE",
                          "- After viewing, the link becomes invalid",
                          "- Save the password immediately",
                          "",
                          "Your Okta login is: " + okta_login,
                          "Your Okta username is: " + okta_username,
                          "",
                          "The credential will be permanently deleted "
                          "after you view it.",
                          "",
                          "---",
                          "This is an automated message from the "
                          "Temporary Credential Generator."
                      ])

                      ses.send_email(
                          Source=os.environ['SENDER_EMAIL'],
                          Destination={'ToAddresses': [dest_email]},
                          Message={
                              'Subject': {
                                  'Data': f'Okta Credentials for '
                                          f'{first_name} {last_name}'},
                              'Body': {'Text': {'Data': email_body}}
                          }
                      )
                      log.info("Sent Okta share link via email",
                               destinationEmail=dest_email)

                      return {'statusCode': 200, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'Okta user created and '
                                             'credentials sent',
                                  'email': dest_email,
                                  'oktaUsername': okta_username,
                                  'oktaLogin': okta_login})}

                  # ── Manual mode (original flow) ───────────────────────────
                  required = ['userName', 'userEmail', 'passwordRecipe']
                  missing = [f for f in required if not body.get(f)]
                  if missing:
                      return {'statusCode': 400, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'Missing: ' +
                                             ', '.join(missing)})}

                  user_name       = body['userName']
                  user_email      = body['userEmail']
                  password_recipe = body['passwordRecipe']
                  username        = body.get('username') or None
                  url             = body.get('url') or None

                  if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$', user_email):
                      return {'statusCode': 400, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'Invalid email address'})}
                  if len(user_name) > 100:
                      return {'statusCode': 400, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'userName too long'})}
                  if url and not re.match(r'^https?://', url):
                      return {'statusCode': 400, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'url must start with '
                                             'http:// or https://'})}
                  if url and len(url) > 2048:
                      return {'statusCode': 400, 'headers': headers,
                              'body': json.dumps({
                                  'message': 'url too long'})}

                  log.info("Processing manual credential",
                           recipientEmail=user_email,
                           recipientName=user_name)

                  share_url = asyncio.run(run(
                      user_name, user_email, password_recipe,
                      username, url, share_duration
                  ))

                  duration_label = DURATION_LABELS.get(
                      share_duration, '1 hour')
                  email_body = '\n'.join([
                      "Temporary Credentials",
                      "",
                      "Hello " + user_name + ",",
                      "",
                      "Your temporary credentials have been generated. "
                      "Click the link below to access them:",
                      "",
                      share_url,
                      "",
                      "IMPORTANT SECURITY NOTES:",
                      f"- This link expires in {duration_label}",
                      "- This link can only be viewed ONCE",
                      "- After viewing, the link becomes invalid",
                      "- Save the password immediately",
                      "",
                      "The credential will be permanently deleted "
                      "after you view it.",
                      "",
                      "---",
                      "This is an automated message from the "
                      "Temporary Credential Generator."
                  ])

                  ses.send_email(
                      Source=os.environ['SENDER_EMAIL'],
                      Destination={'ToAddresses': [user_email]},
                      Message={
                          'Subject': {'Data': 'Temporary Credentials for '
                                              + user_name},
                          'Body': {'Text': {'Data': email_body}}
                      }
                  )
                  log.info("Sent share link via email",
                           recipientEmail=user_email)

                  return {'statusCode': 200, 'headers': headers,
                          'body': json.dumps({
                              'message': 'Credential generated and '
                                         'sent successfully',
                              'email': user_email})}

              except Exception as e:
                  log.error("Unhandled exception",
                            error=str(e), trace=traceback.format_exc())
                  return {'statusCode': 500, 'headers': headers,
                          'body': json.dumps({
                              'message': 'Internal server error'})}

  GenerateLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GenerateCredentialLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/POST/generate'

Outputs:
  WebsiteURL:
    Description: "Main URL for the credential generator"
    Value: !If
      - UseCustomDomain
      - !Sub "https://${CustomDomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"
  
  CloudFrontDistributionId:
    Description: "CloudFront distribution ID"
    Value: !Ref CloudFrontDistribution
  
  S3BucketName:
    Description: "S3 bucket name"
    Value: !Ref SiteBucket
  
  UploadCommand:
    Description: "Command to upload index.html"
    Value: !Sub "aws s3 cp index.html s3://${SiteBucket}/"
  
  CacheInvalidationCommand:
    Description: "Run after uploading files"
    Value: !Sub "aws cloudfront create-invalidation --distribution-id ${CloudFrontDistribution} --paths '/*'"

  OktaEnabled:
    Description: "Whether Okta integration is active"
    Value: !If [HasOkta, "true", "false"]

  WAFWebACLArn:
    Condition: EnableWAFCondition
    Description: "WAF WebACL ARN"
    Value: !GetAtt WAFWebACL.Arn